name: Validate iCalendar Files

on:
  pull_request:
    branches: [main]
    types:
      - opened
      - reopened
      - synchronize
      - closed
  push:
    branches: [main]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
#permissions:
  #contents: write
  #pages: write
  #id-token: write
  #pull-requests: write
permissions: write-all
 
# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  validate-ical:
    name: Built Site, validate iCal files, and Deploy to GitHub Pages (if on main branch)
    runs-on: ubuntu-latest
    permissions: write-all
    #permissions:
      # Give the default GITHUB_TOKEN write permission to commit and push the
      # added or changed files to the repository.
      #contents: write
      #statuses: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          # Value already defaults to true, but `persist-credentials` is required to push new commits to the repository.
      #     persist-credentials: true
      #     #token: ${{ secrets.WORKFLOW_TOKEN }}

      # - name: install stylelint
      #   run: npm install stylelint stylelint-config-standard prettier

      # - name: stylelint
      #   uses: reviewdog/action-stylelint@dd2b435cc6a7c82705307a9dee740c9bbaa10411 # v1.30.2
      #   with:
      #     reporter: github-pr-review # Change reporter.
      #     stylelint_input: '**/*.css'
      #     stylelint_config: '.github/stylelint.config.mjs'

      # - name: Prettier
      #   #uses: https://github.com/creyD/prettier_action@v4.6
      #   uses: creyD/prettier_action@dev
      #   continue-on-error: true
      #   with:
      #     # prettier_plugins: "prettier-plugin-toml prettier-plugin-hugo-post"
      #     allow_other_plugins: true
      #     no_commit: true
      #     add_options: "--update"
      #     prettier_options: "--log-level log --write ."

      # - name: debug
      #   run: git diff; git status

      # - name: Commit and push linting fixes
      #   # Run only on:
      #   # - Pull requests
      #   # - Not on the default branch
      #   if: >
      #     github.event_name == 'pull_request' &&
      #     github.ref_name != github.event.repository.default_branch
      #   uses: stefanzweifel/git-auto-commit-action@v6.0.1
      #   with:
      #     commit_message: "chore: changes from ci"
      #     commit_user_name: ci-linting
      #     add_options: "--update"
      #     # file_pattern: "*"
      #     # skip_dirty_check: true
      #     status_options: "--untracked-files=no"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          activate-environment: true
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            .github/package-lock.json
            .github/exampleSite/package-lock.json

      - name: Install Just
        uses: extractions/setup-just@v4

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Run tests with just
        if: github.ref != 'refs/heads/main' && github.server_url == 'https://github.com'
        env:
          JUST_COLOR: always
          GOPROXY: direct
          PR_NUMBER: ${{ github.event.number }}
        run: |
          # replace 'version = "main"' in .github/exampleSite/hugo.toml with the current branch name
          echo sed -i "s/version = \".*\"/version = \"${GITHUB_HEAD_REF//\//\\\/}\"/" .github/exampleSite/hugo.toml
          sed -i "s/version = \".*\"/version = \"${GITHUB_HEAD_REF//\//\\\/}\"/" .github/exampleSite/hugo.toml
          echo "Set theme version to ${GITHUB_HEAD_REF} in .github/exampleSite/hugo.toml"
          just test_debug

      - name: build with just
        if: github.ref == 'refs/heads/main' && github.server_url == 'https://github.com'
        env:
          JUST_COLOR: always
          GOPROXY: direct
        run: |
          just test_debug

      - name: List generated files
        run: |
          echo "Generated .ics files:"
          find .github/exampleSite/public -type f | sort

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: hugo-build-output
          path: |
            .github/exampleSite/public/
            validation-report.txt
            validation-report-js.txt
          retention-days: 7

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        if: github.ref != 'refs/heads/main' && github.server_url == 'https://github.com'
        with:
          source-dir: ./.github/exampleSite/public

      - name: Deploy main
        uses: JamesIves/github-pages-deploy-action@v4
        if: github.ref == 'refs/heads/main' && github.server_url == 'https://github.com'
        with:
          folder: ./.github/exampleSite/public
          branch: gh-pages
          clean-exclude: pr-preview
          force: false

      - name: Setup Pages
        if: github.ref == 'refs/heads/main' && github.server_url == 'https://github.com'
        uses: actions/configure-pages@v6

      - name: Upload to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.server_url == 'https://github.com'
        uses: actions/upload-pages-artifact@v5
        with:
          path: .github/exampleSite/public

